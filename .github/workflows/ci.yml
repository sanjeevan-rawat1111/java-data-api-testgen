name: testgen CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]
  workflow_dispatch:          # allow manual trigger from GitHub UI

jobs:
  # ── Job 1: lint + unit tests ────────────────────────────────────────────────
  test:
    name: Lint & Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint with flake8
        run: |
          pip install flake8
          # Stop on syntax errors or undefined names; treat everything else as warning
          flake8 testgen/ --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 testgen/ --count --exit-zero --max-line-length=100 --statistics

      - name: Run unit tests
        run: |
          pip install pytest
          pytest tests/ -v --tb=short 2>/dev/null || echo "No tests directory found — skipping"

  # ── Job 2: dry-run generation (no LLM key needed) ───────────────────────────
  dry-run:
    name: Dry-run Generation
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Also check out the java-data-api SUT so the analyzer can read it
          path: java-data-api-testgen

      - name: Checkout java-data-api (SUT)
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/java-data-api
          path: java-data-api
          # If the SUT is private, add a PAT:
          # token: ${{ secrets.GH_PAT }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: java-data-api-testgen/requirements.txt

      - name: Install dependencies
        working-directory: java-data-api-testgen
        run: pip install -r requirements.txt

      - name: Analyze API (no LLM call)
        working-directory: java-data-api-testgen
        run: python -m testgen analyze

      - name: Dry-run generation (shows prompt, skips LLM)
        working-directory: java-data-api-testgen
        run: python -m testgen generate --dry-run

  # ── Job 3: generate + validate (runs on push to main with API key) ───────────
  generate-and-validate:
    name: Generate & Validate Collection
    runs-on: ubuntu-latest
    needs: dry-run
    # Only run when the secret is available (i.e. on push to main, not on PRs
    # from forks where secrets are unavailable)
    if: ${{ github.event_name != 'pull_request' && secrets.OPENAI_API_KEY != '' }}

    steps:
      - name: Checkout testgen
        uses: actions/checkout@v4
        with:
          path: java-data-api-testgen

      - name: Checkout java-data-api (SUT)
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/java-data-api
          path: java-data-api

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: java-data-api-testgen/requirements.txt

      - name: Install dependencies
        working-directory: java-data-api-testgen
        run: pip install -r requirements.txt

      - name: Generate Postman collection
        working-directory: java-data-api-testgen
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python -m testgen generate --feature CI_Generated

      - name: Validate generated collection
        working-directory: java-data-api-testgen
        run: python -m testgen validate collections/CI_Generated.json

      - name: Upload generated collection as artifact
        uses: actions/upload-artifact@v4
        with:
          name: generated-postman-collection
          path: java-data-api-testgen/collections/CI_Generated.json
          retention-days: 30
