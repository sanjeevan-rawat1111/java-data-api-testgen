# java-data-api-testgen configuration

# Path to the java-data-api repository (relative to this file or absolute)
java_data_api_path: "../java-data-api"

# ── LLM ──────────────────────────────────────────────────────────────────────
# Default: Google Gemini Flash (FREE — get key at https://aistudio.google.com/apikey)
provider: "gemini"
model: "gemini-1.5-flash"
# base_url not needed for native gemini provider
temperature: 0.2
max_tokens: 8192

# Self-healing retry loop (generation)
max_retries: 3
retry_delay_seconds: 2.0

# Self-debug loop (run → fix → re-run)
max_debug_attempts: 3
service_wait_seconds: 25

# ── Output ───────────────────────────────────────────────────────────────────
# Generated collections land here — Newman runner picks them up automatically
output_dir: "collections"
default_feature_name: "java-data-api-tests"
